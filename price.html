<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
  <link rel="icon" href="./images/icon.png" type="image/x-icon">

  <title>Profit-Loss Calculator</title>
  <link href="./style.css" rel="stylesheet">
</head>

<body>

  <nav class="navbar navbar-expand-lg shadow-sm mb-2 navbar-light bg-light">
    <div class="container py-2 d-flex justify-content-between align-items-center">
      <h4 class="m-0">
        <img src="./images/logo.png" alt="site logo" width="35"/> Profit-Loss Calculator
      </h4>
      <a href="./index.html" class="btn btn-next-price btn-sm">Home</a>
    </div>
  </nav>

  <div class="container">
    <div class="row">

      <div class="col-12 col-lg-6 mx-auto input-box">
        <h3 class="text-center">Information</h3>
        <hr>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="company_name" class="form-label optional">Company Name</label>
            <input type="text" class="form-control" id="company_name" value="" placeholder="Company Name">
          </div>

          <div class="col-md-6 mb-3">
            <label for="quantity" class="form-label required">Buy Unit Quantity</label>
            <input type="number" class="form-control" id="quantity" value="" placeholder="Buy Unit Quantity">
          </div>
          <div class="col-md-6 mb-3">
            <label for="cost_price" class="form-label required">Buy Per Price</label>
            <input type="number" class="form-control" id="cost_price" value="" placeholder="Buy Per Price">
          </div>
          <div class="col-md-6 mb-3">
            <label for="selling_price" class="form-label required">Sale Per Price</label>
            <input type="number" class="form-control" id="selling_price" value="" placeholder="Sale Per Price">
          </div>
          <div class="col-md-12 mb-3">
            <label for="counting" class="form-label optional">Calculate Count</label>
            <input type="number" class="form-control" id="counting" placeholder="Calculate Count">
          </div>
        </div>
        <div class="mb-3">
          <button type="button" class="btn btn-sky-blue btn-sm w-100" id="btn-submit">Submit</button>
          <button type="button" class="btn btn-sky-red btn-sm w-100 mt-3" id="btn-reset">Reset</button>
        </div>
      </div>
      <div class="row">
        <div class="demo-table col-12 col-lg-6 d-none"></div>

        <div class="col-12 col-lg-6 mx-auto insert-table">
        </div>
      </div>
    </div>
  </div>


  <!-- Option 1: Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Option 2: Separate Popper and Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <script src="js/hitlog.js"></script>
  <script src="js/price.js"></script>
</body>

</html>
