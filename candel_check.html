<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Candlestick Chart Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>

<body style="background: #f4f4f4; padding: 20px;">
    <h2 style="text-align: center;">Stock Price - Candlestick Chart</h2>
    <div id="chart" style="max-width: 700px; margin: auto;"></div>

    <script>



        const fetchData = async () => {
            try {
                const response = await fetch('https://www.amarstock.com/data/afe01cd8b512070a/?scrip=RAHIMTEXT&cycle=Day1&dtFrom=2022-08-12T04:39:21.243Z');
                const data = await response.json();
                console.log(data);
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        fetchData();

        const seriesData = [
            {
                x: new Date(2025, 4, 4), // May 4, 2025
                y: [107.5, 107.5, 104.3, 106.1]
            },
            {
                x: new Date(2025, 4, 5),
                y: [106.1, 108.2, 105.5, 107.9]
            },
            {
                x: new Date(2025, 4, 6),
                y: [107.9, 109.5, 106.8, 108.4]
            },
            {
                x: new Date(2025, 4, 7),
                y: [108.4, 110.1, 107.5, 109.7]
            },
            {
                x: new Date(2025, 4, 8),
                y: [109.7, 111.3, 108.9, 110.5]
            }
        ];

        const options = {
            chart: {
                type: 'candlestick',
                height: 400
            },
            title: {
                text: 'RAHIMTEXT - 5 Day Candlestick Demo',
                align: 'center'
            },
            series: [{
                data: seriesData
            }],
            xaxis: {
                type: 'datetime'
            },
            yaxis: {
                tooltip: {
                    enabled: true
                }
            }
        };

        const chart = new ApexCharts(document.querySelector("#chart"), options);
        chart.render();
    </script>
</body>

</html>
