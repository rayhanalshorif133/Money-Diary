<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Hover Box</title>
  <style>
    .box {
      height: 20rem;
      width: 20rem;
      perspective: 1000px; /* Enables 3D effect */
      cursor: pointer;
    }

    .inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.6s;
    }

    .box:hover .inner {
      transform: rotateY(180deg);
    }

    .front, .back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden; /* Prevents mirrored text */
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.5rem;
      color: aliceblue;
    }

    .front {
      background: #005d20;
    }

    .back {
      background: #ff0000;
      transform: rotateY(180deg);
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="inner">
      <div class="front">hover me</div>
      <div class="back">yes, hover now!</div>
    </div>
  </div>
</body>
</html>
