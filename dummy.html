<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip + Blind Mask</title>
    <style>
        .box {
            height: 20rem;
            width: 20rem;
            perspective: 1000px;
            cursor: pointer;
        }

        .inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }

        .box:hover .inner {
            transform: rotateY(180deg);
        }

        .front,
        .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: aliceblue;
        }

        .front {
            background: #005d20;
        }

        .back {
            background: #ff0000;
            transform: rotateY(180deg);
        }

        .image_container {
            margin-top: 10rem;
            position: relative;
            height: 20rem;
            width: 20rem;
        }

        .img1 {
            background-image: url('./images/bg.png');
            height: 100%;
            width: 100%;
            position: absolute;
            background-size: cover;
        }

        .img2 {
            background-image: url('./images/new.jpg');
            height: 100%;
            width: 100%;
            position: absolute;
            background-size: cover;
            transition: all 0.5s ease-in-out;

            /* BLIND EFFECT */

        }

        .image_container:hover .img2 {
            -webkit-mask-image: linear-gradient(to right, rgba(0, 0, 0, 1) 50%, transparent 50%);
            -webkit-mask-repeat: repeat;
            -webkit-mask-size: 40px 100%;
            mask-image: linear-gradient(to right, rgba(0, 0, 0, 1) 50%, transparent 50%);
            mask-repeat: repeat;
            mask-size: 40px 100%;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="inner">
            <div class="front">hover me</div>
            <div class="back">yes, hover now!</div>
        </div>
    </div>

    <div class="image_container">
        <div class="img1"></div>
        <div class="img2"></div>
    </div>
</body>

</html>
