<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- favicon -->
  <link rel="icon" href="./images/icon.png" type="image/x-icon">


  <title>
    <!-- Profit-Loss Calculator -->
    Title of the Page
  </title>
  <link href="./style.css" rel="stylesheet">

  <style>
    .card {
      width: 320px;
      border-radius: 15px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .card-header {
      background-color: #f8f9fa;
      border-bottom: 1px solid #dee2e6;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
    }

    .card-header small {
      font-size: 0.75rem;
      color: #6c757d;
    }

    .delete-btn {
      color: #dc3545;
      font-size: 1.3rem;
      cursor: pointer;
    }

    .card-body p {
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }

    .cursor-pointer {
      cursor: pointer;
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg shadow-sm mb-2 navbar-light bg-light">
    <div class="container py-2 d-flex justify-content-between align-items-center">
      <h4 class="m-0">
        <img src="./images/logo.png" alt="site logo" width="35" />
        <!-- Profit-Loss Calculator -->
        Title of the Page
      </h4>
      <a href="/index.html" class="btn btn-navy btn-sm">Home</a>
    </div>
  </nav>

  <div class="container">
    <div class="col-12">
      <h3 class="text-center mb-4">Previous Information</h3>
    </div>
    <div class="row" id="prev-info-container">
      <!-- loading -->
      <div class="col-12 text-center">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
    </div>
  </div>


  <!-- Option 1: Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Option 2: Separate Popper and Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <script>
    var supabaseConn = supabase.createClient(
      "https://bdmzqapfwgohgkctmzht.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkbXpxYXBmd2dvaGdrY3Rtemh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM2OTE0MDcsImV4cCI6MjA2OTI2NzQwN30.EUrn0pIDQNBCyAqo3Z8fIi22ZKgxv91I6sI7_0ujw20"
    );



    $(document).ready(function () {
      fetchPrevInfo();
    });

    const fetchPrevInfo = async () => {
      console.clear();
      console.log('Fetching previous info from prevInfo table');

      const { data, error } = await supabaseConn
        .from('prevInfo')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Error fetching data:', error);
        return;
      }

      console.log('Fetched data:', data);

      const container = $('#prev-info-container');
      container.empty(); // Clear previous content
      if (data.length === 0) {
        container.append('<p class="text-center">No previous information available.</p>');
        return;
      }

      data.forEach(item => {
        const url = `./index.html?alreadyUnitQty=${item.already_unit_qty}
                &costPerPrice=${item.cost_per_price.toFixed(2)}
                &currentPerPrice=${item.current_per_price.toFixed(2)}
                &investNewAmount=${item.invest_new_amount.toFixed(2)}
                &counter=${item.counter}`.replace(/\n/g, '').replace(/ /g, '');

        const card = `
          <div class="col-md-3 my-2 mx-auto">
            <div class="card">
              <div class="card-header">
                <div>
                  <div>🏢 <strong>${item.company_name}</strong></div>
                  <small>${new Date(item.created_at).toLocaleTimeString()} - ${new Date(item.created_at).toLocaleDateString()}</small>
                </div>
                <i class="fa-solid fa-trash text-danger cursor-pointer" title="Delete" data-id="${item.id}"></i>
              </div>
              <div class="card-body">
                <p><strong>Already Unit Quantity:</strong> ${item.already_unit_qty}</p>
                <p><strong>Cost Per Price:</strong> ${item.cost_per_price.toFixed(2)} BDT</p>
                <p><strong>Current Per Price:</strong> ${item.current_per_price.toFixed(2)} BDT</p>
                <p><strong>Invest New Amount:</strong> ${item.invest_new_amount.toFixed(2)} BDT</p>
                <p><strong>Counter:</strong> ${item.counter}</p>
                <a href="${url}" class="btn btn-primary btn-sm w-100 use-me-btn">Use Me</a>
              </div>
            </div>
          </div>`;
        container.append(card);
      });
    };

  </script>
</body>

</html>
