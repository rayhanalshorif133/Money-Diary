<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- favicon -->
  <link rel="icon" href="./images/icon.png" type="image/x-icon">


  <title>
    Profit Loss Calculator
  </title>
  <link href="./css/new_styles.css" rel="stylesheet">

  <style>
    .card {
      width: 320px;
      border-radius: 15px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .card-header {
      background-color: #f8f9fa;
      border-bottom: 1px solid #dee2e6;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
    }

    .card-header small {
      font-size: 0.75rem;
      color: #6c757d;
    }

    .delete-btn {
      color: #dc3545;
      font-size: 1.3rem;
      cursor: pointer;
    }

    .card-body p {
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }

    .cursor-pointer {
      cursor: pointer;
    }

    .btn-goto-home {
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      border: none;
      transition: all 0.3s ease-in-out;
    }

    .btn-goto-home:hover {
      background: linear-gradient(135deg, #2575fc, #6a11cb);
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(101, 115, 255, 0.4);
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="navbar-container">
      <div class="logo">
        <img src="./images/logo.png" alt="site logo" width="35" />
        Profit Loss Calculator
      </div>
      <button class="mobile-nav-toggle" aria-label="Toggle navigation">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
      <ul class="nav-links">
        <li><a href="./index.html">Home</a></li>
        <li><a href="./prev-info.html">Previous Info</a></li>
        <li><a href="./all.html">All Stocks</a></li>
        <li><a href="./stock-data-view.html">Stock Data View</a></li>
        <!-- <li><a href="./price.html">Price</a></li> -->
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="col-12">
      <h3 class="text-center mb-4">Previous Information</h3>
    </div>
    <div class="row" id="prev-info-container">
      <div class="col-12 text-center">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
    </div>
  </div>


  <!-- Option 1: Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Option 2: Separate Popper and Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <script>
    var supabaseConn = supabase.createClient(
      "https://bdmzqapfwgohgkctmzht.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkbXpxYXBmd2dvaGdrY3Rtemh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM2OTE0MDcsImV4cCI6MjA2OTI2NzQwN30.EUrn0pIDQNBCyAqo3Z8fIi22ZKgxv91I6sI7_0ujw20"
    );



    $(document).ready(function () {
      fetchPrevInfo();
      handleDeleteButtonClick();
    });

    const fetchPrevInfo = async () => {
      console.clear();

      const userId = localStorage.getItem('user_id');
      if (!userId) {
        $('#prev-info-container').html(`
          <p class="text-center">No user information found. Please log in.</p>
          <a href="./login.html" class="btn btn-goto-home text-white btn-sm rounded-pill shadow-sm px-4 py-2 d-block w-25 mx-auto text-center">
            🏠 Go to Login
          </a>
        `);
        return;
      }

      const { data, error } = await supabaseConn
        .from('prevInfo')
        .select('*')
        .eq('user_id', userId)
        .order('created_at', { ascending: false });


      console.log(data, error);
      if (error) {
        console.error('Error fetching data:', error);
        return;
      }


      const container = $('#prev-info-container');
      container.empty(); // Clear previous content
      if (data.length === 0) {
        container.append(`
          <p class="text-center">No previous information available.</p>
          <a href="./index.html" class="btn btn-goto-home text-white btn-sm rounded-pill shadow-sm px-4 py-2 d-block w-25 mx-auto text-center">
            🏠 Go to Home
          </a>
        `);
        return;
      }

      data.forEach(item => {
        const url = `./index.html?companyName=${item.company_name}&alreadyUnitQty=${item.already_unit_qty}
                &costPerPrice=${item.cost_per_price.toFixed(2)}
                &currentPerPrice=${item.current_per_price.toFixed(2)}
                &investNewAmount=${item.invest_new_amount.toFixed(2)}
                &counter=${item.counter}`.replace(/\n/g, '').replace(/ /g, '');

        const card = `
          <div class="col-md-3 my-2 mx-auto">
            <div class="card">
              <div class="card-header">
                <div>
                  <div>🏢 <strong>${item.company_name}</strong></div>
                  <small>${new Date(item.created_at).toLocaleTimeString()} - ${new Date(item.created_at).toLocaleDateString()}</small>
                </div>
                <i class="fa-solid fa-trash text-danger cursor-pointer deleteBtn" title="Delete" data-id="${item.id}"></i>
              </div>
              <div class="card-body">
                <p><strong>Already Unit Quantity:</strong> ${item.already_unit_qty}</p>
                <p><strong>Cost Per Price:</strong> ${item.cost_per_price.toFixed(2)} BDT</p>
                <p><strong>Current Per Price:</strong> ${item.current_per_price.toFixed(2)} BDT</p>
                <p><strong>Invest New Amount:</strong> ${item.invest_new_amount.toFixed(2)} BDT</p>
                <p><strong>Counter:</strong> ${item.counter}</p>
                <a href="${url}" class="btn btn-primary btn-sm w-100 use-me-btn">Use Me</a>
              </div>
            </div>
          </div>`;
        container.append(card);
      });
    };


    const handleDeleteButtonClick = () => {
      $(document).on('click', '.deleteBtn', async function () {
        const id = $(this).data('id');
        Swal.fire({
          title: "Are you sure?",
          text: "You won't be able to revert this!",
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#3085d6",
          cancelButtonColor: "#d33",
          confirmButtonText: "Yes, delete it!"
        }).then(async (result) => {
          if (result.isConfirmed) {
            const { error } = await supabaseConn
              .from('prevInfo')
              .delete()
              .eq('id', id);

            if (error) {
              console.error('Error deleting record:', error);
            } else {
              Swal.fire({
                title: "Deleted!",
                text: "Record deleted successfully.",
                icon: "success"
              });
              fetchPrevInfo(); // Refresh the list after deletion
            }

          }
        });
      });
    };
  </script>
</body>

</html>
