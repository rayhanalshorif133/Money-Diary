<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- favicon -->
  <link rel="icon" href="./images/icon.png" type="image/x-icon">


  <title>
    Profit Loss Calculator
  </title>
  <link href="./css/prev-info.css" rel="stylesheet">

</head>

<body>

  <nav>
    <div class="logo">MyApp</div>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Investments</a></li>
      <li><a href="#">Reports</a></li>
      <li><a href="#">Logout</a></li>
    </ul>
  </nav>

  <main>
    <h1>Investment Overview</h1>
    <div class="card-grid" id="cardContainer">
    </div>
  </main>

  <footer>
    &copy; 2025 MyApp. All rights reserved.
  </footer>


  <!-- Option 1: Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Option 2: Separate Popper and Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <script>
    var supabaseConn = supabase.createClient(
      "https://bdmzqapfwgohgkctmzht.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkbXpxYXBmd2dvaGdrY3Rtemh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM2OTE0MDcsImV4cCI6MjA2OTI2NzQwN30.EUrn0pIDQNBCyAqo3Z8fIi22ZKgxv91I6sI7_0ujw20"
    );



    $(document).ready(function () {
      fetchPrevInfo();
      handleDeleteButtonClick();
    });

    const fetchPrevInfo = async () => {


      const userId = localStorage.getItem('user_id');
      if (!userId) {
        $('#prev-info-container').html(`
          <p class="text-center">No user information found. Please log in.</p>
          <a href="./login.html" class="btn btn-goto-home text-white btn-sm rounded-pill shadow-sm px-4 py-2 d-block w-25 mx-auto text-center">
            🏠 Go to Login
          </a>
        `);
        return;
      }



      const { data, error } = await supabaseConn
        .from('prevInfo')
        .select('*')
        .eq('user_id', userId)
        .order('created_at', { ascending: false });


      if (error) {
        console.error('Error fetching data:', error);
        return;
      }


      const container = $('#cardContainer');
      container.empty(); // Clear previous content
      if (data.length === 0) {
        container.append(`
          <p class="text-center">No previous information available.</p>
          <a href="./index.html" class="btn btn-goto-home text-white btn-sm rounded-pill shadow-sm px-4 py-2 d-block w-25 mx-auto text-center">
            🏠 Go to Home
          </a>
        `);
        return;
      }


      var HTML = "";
      data.forEach(item => {
        var URLDATA = `./index.html?alreadyUnitQty=${item.already_unit_qty}&costPerPrice=${item.cost_per_price.toFixed(2)}&currentPerPrice=${item.current_per_price.toFixed(2)}&investNewAmount=${item.invest_new_amount.toFixed(2)}&counter=${item.counter}&companyName=${item.company_name}&counting=${item.counter}`;
        HTML += `
        <div class="card">
          <div class="card-header">
          <div>
            <div>🏢 <strong>${item.company_name}</strong></div>
            <small>${new Date(item.created_at).toLocaleTimeString()} - ${new Date(item.created_at).toLocaleDateString()}</small>
          </div>
          <i class="fa-solid fa-trash text-danger deleteBtn" title="Delete" data-id="${item.id}"></i>
        </div>
        <div class="card-body">
          <p><strong>Already Unit Quantity:</strong> ${item.already_unit_qty}</p>
          <p><strong>Cost Per Price:</strong> ${item.cost_per_price.toFixed(2)} BDT</p>
          <p><strong>Current Per Price:</strong> ${item.current_per_price.toFixed(2)} BDT</p>
          <p><strong>Invest New Amount:</strong> ${item.invest_new_amount.toFixed(2)} BDT</p>
          <p><strong>Counter:</strong> ${item.counter}</p>
          <a href="${URLDATA}" class="use-me-btn">Use Me</a>
        </div>
        </div>
      `;

      });

      container.html(HTML);

    };


    const handleDeleteButtonClick = () => {
      $(document).on('click', '.deleteBtn', async function () {
        const id = $(this).data('id');
        Swal.fire({
          title: "Are you sure?",
          text: "You won't be able to revert this!",
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#3085d6",
          cancelButtonColor: "#d33",
          confirmButtonText: "Yes, delete it!"
        }).then(async (result) => {
          if (result.isConfirmed) {
            const { error } = await supabaseConn
              .from('prevInfo')
              .delete()
              .eq('id', id);

            if (error) {
              console.error('Error deleting record:', error);
            } else {
              Swal.fire({
                title: "Deleted!",
                text: "Record deleted successfully.",
                icon: "success"
              });
              fetchPrevInfo(); // Refresh the list after deletion
            }

          }
        });
      });
    };
  </script>
</body>

</html>
