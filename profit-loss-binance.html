<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Money Diary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">

    <link icon rel="icon" type="image/png" href="./images/icon.ico" />

    <link href="./css/style.css" rel="stylesheet">

    <style>
        .result-container {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #display-result {
            font-family: 'Courier New', Courier, monospace;
        }
    </style>

</head>

<body>
    <nav class="nav_container">
        <div class="nav_left">
            <a href="./index.html" class="logo">
                Money Diary
            </a>
        </div>
        <div class="nav_right">
            <button class="menu_toggle" id="menuToggle">☰</button>
            <div class="nav_links" id="navLinks">
                <button id="LogoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 800px; margin: 20px auto; padding: 0 15px;">
        <div class="investment-card" id="investment-container">
            <h2 style="display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-calculator" style="color: #3498db;"></i> Calculation
            </h2>
            <form id="investmentForm" class="investment-form">
                <input type="hidden" id="share_id" name="share_id" value="N/A" />

                <div class="input-group">
                    <label for="company_name">Company Name (Optional)</label>
                    <input type="text" id="company_name" name="companyName" placeholder="e.g. BTC/USDT" />
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label>Before Amount (USDT)</label>
                        <input type="number" id="before_amount" value="39.9" step="any" />
                    </div>
                    <div class="input-group">
                        <label>Current Amount (USDT)</label>
                        <input type="number" id="current_amount" value="0.95" step="any" />
                    </div>
                </div>

                <div class="input-group">
                    <label>Current Qty</label>
                    <input type="number" id="current_qty" value="3054.61" step="any" />
                </div>

                <div style="margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
                    <button type="button" class="btn-submit" id="btn-submit" style="flex: 2;">Calculate</button>
                    <a href="#profit-gain" class="btn-target"
                        style="flex: 1; text-align: center; text-decoration: none; line-height: 40px; background: #f39c12; color: white; border-radius: 5px;">🎯
                        Target</a>
                </div>
            </form>

            <div id="result-box" class="result-container"
                style="display: none; margin-top: 20px; padding: 15px; border-radius: 10px; background: #ebf5fb; border-left: 5px solid #3498db;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-weight: 600; color: #2c3e50;">Average Buy Price:</span>
                    <span id="display-result" style="font-size: 22px; font-weight: bold; color: #2980b9;">0.00</span>
                </div>
            </div>
        </div>

        <div class="investment-card" id="profit-gain"
            style="display: none; margin-top: 25px; padding: 0; overflow: hidden; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">
            <div style="background: #2c3e50; color: white; padding: 20px;">
                <h2 style="margin: 0; font-size: 1.2rem; color: #fff;"><i class="fas fa-chart-line"></i> Profit Analysis
                    (1% - 100%)</h2>
                <div style="display: flex; gap: 20px; margin-top: 15px; opacity: 0.9;">
                    <div>
                        <small style="display: block; font-size: 10px; text-transform: uppercase;">Initial
                            Capital</small>
                        <span id="initial-capital-display" style="font-weight: bold;">0.00</span> <small>USDT</small>
                    </div>
                    <div style="border-left: 1px solid #5d6d7e; padding-left: 20px;">
                        <small style="display: block; font-size: 10px; text-transform: uppercase;">Total
                            Quantity</small>
                        <span id="qty-display" style="font-weight: bold;">0.00</span>
                    </div>
                </div>
            </div>

            <div style="max-height: 500px; overflow-y: auto;">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead style="position: sticky; top: 0; background: #f8f9fa; z-index: 10;">
                        <tr style="border-bottom: 2px solid #eee;">
                            <th style="padding: 15px; font-size: 12px; color: #7f8c8d;">TARGET</th>
                            <th style="padding: 15px; font-size: 12px; color: #7f8c8d;">SELL PRICE</th>
                            <th style="padding: 15px; font-size: 12px; color: #7f8c8d;">PROFIT</th>
                            <th style="padding: 15px; font-size: 12px; color: #7f8c8d;">AFTER SELL</th>
                            <th style="padding: 15px; font-size: 12px; color: #7f8c8d;">TOTAL USDT</th>
                        </tr>
                    </thead>
                    <tbody id="profit-table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>





    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
    <script src="./js/hitlog.js"></script>
    <script src="./js/script-binance.js"></script>


</body>

</html>
