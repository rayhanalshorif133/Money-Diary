<!DOCTYPE html>
<html>

<head>
    <title>Singin & Singup</title>
    <link rel="stylesheet" type="text/css" href="./css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link icon rel="icon" type="image/png" href="./images/icon.ico" />

</head>

<body>

    <div class="main">
        <div id="error_container" class="error hidden"></div>
        <input type="checkbox" id="chk" aria-hidden="true">
        <div class="signup">
            <form>
                <label for="chk" aria-hidden="true">Sign up</label>
                <input type="text" id="signup_username" placeholder="User name" required="">
                <input type="email" id="signup_email" placeholder="Email" required="">
                <input type="password" id="signup_pswd" placeholder="Password" required="">
                <input type="password" id="signup_cpswd" placeholder="Confirm Password" required="">
                <button id="signupBtn" type="button">Sign up</button>
            </form>
        </div>

        <div class="login">
            <form id="loginForm" action="javascript:void(0);">
                <label for="chk" aria-hidden="true">Login</label>
                <input type="email" id="login_email" placeholder="Email" required="">
                <input type="password" id="login_pswd" placeholder="Password" required="">
                <button id="loginBtn" type="button">Login</button>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="./js/hitlog.js"></script>
    <script src="./js/auth.js"></script>
</body>

</html>
