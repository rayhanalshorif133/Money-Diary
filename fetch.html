<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stock EOD Data Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }
    label {
      font-weight: bold;
      margin-right: 10px;
    }
    select, input[type="date"], input[type="number"] {
      padding: 6px;
      margin: 10px 10px 10px 0;
    }
    button {
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }
    th {
      background-color: #f4f4f4;
    }
  </style>
</head>
<body>
  <h1>Stock EOD Data Viewer</h1>

  <div>
    <label for="code">Trading Code:</label>
    <select id="code">
      <option value="ACFL">ACFL</option>
      <option value="SQURPHARMA">SQURPHARMA</option>
      <option value="GP">GP</option>
      <option value="POWERGRID">POWERGRID</option>
      <!-- Add more if needed -->
    </select>

    <label for="upto">Upto Date:</label>
    <input type="date" id="upto" value="2025-08-02" />

    <label for="count">Count:</label>
    <input type="number" id="count" min="1" value="60" />

    <button onclick="fetchData()">Load Data</button>
  </div>

  <div id="output"></div>

  <script>
    async function fetchData() {
      const code = document.getElementById('code').value;
      const upto = document.getElementById('upto').value;
      const count = document.getElementById('count').value;

      const url = `https://provider.bullbd.com/shares/get-eod-data-count?code=${code}&upto=${upto}&count=${count}`;
      
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Network error: ' + response.status);

        const data = await response.json();
        if (!Array.isArray(data)) {
          document.getElementById('output').innerText = 'Invalid data format from API.';
          return;
        }

        let html = `<table>
                      <tr>
                        <th>Date</th>
                        <th>Open</th>
                        <th>High</th>
                        <th>Low</th>
                        <th>Close</th>
                        <th>Trades</th>
                      </tr>`;

        data.forEach(item => {
          const date = new Date(item.d).toISOString().split('T')[0];
          html += `<tr>
                     <td>${date}</td>
                     <td>${item.o}</td>
                     <td>${item.h}</td>
                     <td>${item.l}</td>
                     <td>${item.c}</td>
                     <td>${item.t}</td>
                   </tr>`;
        });

        html += `</table>`;
        document.getElementById('output').innerHTML = html;

      } catch (error) {
        document.getElementById('output').innerText = 'Error: ' + error.message;
      }
    }
  </script>
</body>
</html>
