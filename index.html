<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- favicon -->
  <link rel="icon" href="./images/icon.png" type="image/x-icon">


  <title>Profit-Loss Calculator</title>
  <link href="./style.css" rel="stylesheet">

</head>

<body>

  <nav class="navbar navbar-expand-lg shadow-sm mb-2 navbar-light bg-light">
    <div class="container py-2 d-flex justify-content-between align-items-center">
      <h4 class="m-0">
        <img src="./images/logo.png" alt="site logo" width="35" /> Profit-Loss Calculator
      </h4>
      <a href="./price.html" class="btn btn-navy btn-sm" id="priceBtn">Price</a>
    </div>
  </nav>

  <div class="container">
    <div class="row">

      <div class="col-12 col-lg-6 mx-auto input-box">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h3 class="mb-0">Information</h3>
          <a href="./prev-info.html" class="btn btn-fuchsia btn-sm">Previous Info</a>
        </div>
        <hr>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="company_name" class="form-label optional">Company Name</label>
            <input type="text" class="form-control" id="company_name" value="" placeholder="Company Name">
          </div>

          <div class="col-md-6 mb-3">
            <label for="quantity" class="form-label required">Already Unit Quantity</label>
            <input type="number" class="form-control" id="already_quantity" value=""
              placeholder="Already Unit Quantity">
          </div>
          <div class="col-md-6 mb-3">
            <label for="cost_price" class="form-label required">Cost Per Price</label>
            <input type="number" class="form-control" id="cost_price" value="" placeholder="Cost Per Price">
          </div>
          <div class="col-md-6 mb-3">
            <label for="current_price" class="form-label required">Current Per Price</label>
            <input type="number" class="form-control" id="current_price" value="" placeholder="Current Per Price">
          </div>
          <div class="col-md-6 mb-3">
            <label for="new_investment" class="form-label required">Invest New Amount</label>
            <input type="number" class="form-control" id="new_investment" value="" placeholder="Invest Amount">
          </div>
        </div>
        <div class="mb-3">
          <button type="button" class="btn btn-sky-blue btn-sm w-100" id="btn-submit">Submit</button>
        </div>
      </div>
      <div class="demo-table"></div>

      <div class="col-12 col-lg-6 mx-auto insert-table">
      </div>
    </div>
  </div>

  <!-- Option 1: Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Option 2: Separate Popper and Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <script src="./js/hitlog.js"></script>
  <script src="./js/script.js"></script>

</body>

</html>
