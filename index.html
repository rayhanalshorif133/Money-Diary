<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>Hello, world!</title>
  <link href="./style.css" rel="stylesheet">
</head>

<body>

  <nav class="navbar navbar-expand-lg shadow-sm mb-2 navbar-light bg-light">
    <div class="container py-2 ">
      Nam Pore Duya Hbe
    </div>
  </nav>
  <div class="container">
    <div class="row">

      <div class="col-md-4 mx-auto input-box">
        <h3>Information</h3>
        <hr>
        <div class="mb-3">
          <label for="company_name" class="form-label optional">Company Name</label>
          <input type="text" class="form-control" id="company_name" placeholder="Enter Company Name">
        </div>

        <div class="mb-3">
          <label for="quantity" class="form-label required">Buy Unit Quantity</label>
          <input type="number" class="form-control" id="quantity" placeholder="Enter Buy Unit Quantity">
        </div>

        <div class="mb-3">
          <label for="cost_price" class="form-label required">Buy Per Price</label>
          <input type="email" class="form-control" id="cost_price" placeholder="Enter Buy Per Price">
        </div>
        <div class="mb-3">
          <label for="selling_price" class="form-label required">Sale Per Price</label>
          <input type="email" class="form-control" id="selling_price" placeholder="Enter Sale Per Price">
        </div>
        <div class="mb-3">
          <button type="button" class="btn btn-sky-blue btn-sm w-100" id="btn-submit">Submit</button>
        </div>
      </div>
      <div class="demo-table d-none">
        
      </div>

      <div class="col-md-6 mx-auto insert-table">
      </div>
    </div>
  </div>

  <!-- Optional JavaScript; choose one of the two! -->

  <!-- Option 1: Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Option 2: Separate Popper and Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <script src="./script.js"></script>
</body>

</html>
