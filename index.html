<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profit Loss Calculator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <!-- <link href="./new_style.css" rel="stylesheet"> -->
  <style>
    :root {
      --bg: #0f1115;
      --card: #151924;
      --fg: #e6e6e6;
      --muted: #9aa4b2;
      --green: #17b26a;
      --green-soft: #0f2b1f;
      --red: #f04438;
      --red-soft: #2e1414;
      --border: #222938;
      --accent: #2b3347;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg, #0d1016, #0f1115 40%);
      color: var(--fg);
    }

    .wrap {
      max-width: 1100px;
      margin: 32px auto;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 20px;
      margin: 0;
      letter-spacing: 0.3px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button,
    .pill {
      background: var(--accent);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }

    button:hover {
      filter: brightness(1.08);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 840px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .card h2 {
      font-size: 16px;
      margin: 0;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
    }

    .buy h2 {
      color: var(--green);
    }

    .sell h2 {
      color: var(--red);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(2px);
    }

    th,
    td {
      text-align: right;
      padding: 10px 12px;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.06);
      font-variant-numeric: tabular-nums;
    }

    th:first-child,
    td:first-child {
      text-align: left;
    }

    tbody tr:nth-child(even).buy-row {
      background: var(--green-soft);
    }

    tbody tr:nth-child(odd).buy-row {
      background: rgba(23, 178, 106, 0.08);
    }

    tbody tr:nth-child(even).sell-row {
      background: var(--red-soft);
    }

    tbody tr:nth-child(odd).sell-row {
      background: rgba(240, 68, 56, 0.08);
    }

    tfoot td {
      font-weight: 600;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.02);
    }

    .muted {
      color: var(--muted);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
    }

    .kpi {
      display: grid;
      grid-template-columns: auto auto;
      gap: 4px 12px;
      font-size: 14px;
    }

    .kpi div:nth-child(2n) {
      text-align: right;
    }

    /* base nav */
    .nav_container {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav_container .logo {
      font-weight: 600;
      font-size: 18px;
      color: var(--fg);
    }

    .nav_container .nav_right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .nav_container a {
      text-decoration: none;
      color: var(--muted);
      font-size: 14px;
      transition: color 0.2s ease;
    }

    .nav_container a:hover {
      color: var(--fg);
    }

    .menu_toggle {
      background: none;
      border: none;
      color: var(--fg);
      font-size: 22px;
      cursor: pointer;
      display: none;
    }

    /* Responsive */
    @media (max-width: 720px) {
      .menu_toggle {
        display: block;
      }

      .nav_links {
        display: none;
        flex-direction: column;
        gap: 12px;
        margin-top: 10px;
        background: var(--card);
        padding: 12px;
        border-radius: 8px;
        width: 100%;
      }

      .nav_links.show {
        display: flex;
      }

      .nav_right {
        width: 100%;
        justify-content: flex-end;
        gap: 16px;
        margin-top: 10px;
      }
    }

    /* Form card wrapper */
    .investment-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin: 2rem auto 0 auto;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
    }

    /* Form grid */
    .investment-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* Labels */
    .investment-form label {
      display: block;
      margin-bottom: 4px;
      color: var(--fg);
      font-size: 16px;
    }

    /* Inputs */
    .investment-form input {
      width: 100%;
      padding: 10px;
      /* padding o boro korle text beshi comfortable */
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--fg);
      font-size: 16px;
    }

    /* Submit button */
    .investment-form button {
      grid-column: span 2;
      padding: 10px 16px;
      border-radius: 12px;
      background: var(--green);
      color: #fff;
      border: none;
      cursor: pointer;
    }

    .investment-form button:hover {
      filter: brightness(1.05);
    }

    .tabs {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 16px;
    }

    .tab-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .tab-buttons button {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      color: var(--fg);
      cursor: pointer;
    }

    .tab-buttons button.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 12px 0;
    }

    .checkbox-field input {
      width: 18px;
      height: 18px;
    }

    .checkbox-field label:hover,
    .checkbox-field input:hover .checkbox-field:hover {
      cursor: pointer;
    }


    .toggle-btn.hide {
      background: #6f0000 !important;
    }

    .toggle-btn.show {
      background: #006f4c !important;
    }

    .toggle-btn i {
      margin-right: 5px;
    }

    .hidden {
      display: none;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    @media (max-width: 900px) {
      .grid-3 {
        grid-template-columns: 1fr;
      }
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    @media (max-width: 1200px) {
      .grid-4 {
        grid-template-columns: repeat(2, 1fr);
        /* Tablet view */
      }
    }

    @media (max-width: 700px) {
      .grid-4 {
        grid-template-columns: 1fr;
        /* Mobile view */
      }
    }
  </style>
</head>

<body>
  <nav class="nav_container">
    <div class="nav_left">
      <span class="logo">
        Profit Loss Calculator
      </span>
    </div>
    <div class="nav_right">
      <button class="menu_toggle" id="menuToggle">☰</button>
      <div class="nav_links" id="navLinks">
        <a href="#">Logout</a>
      </div>
    </div>
  </nav>

  <div class="investment-card" id="investment-container">
    <h2>Investment Form</h2>
    <form id="investmentForm" class="investment-form">
      <div>
        <label for="companyName">Company Name (Optional)</label>
        <input type="text" id="company_name" name="companyName" value="NEW" placeholder="company name" />
      </div>
      <div>
        <label for="keyword">Keyword (Optional)</label>
        <input type="text" id="keyword" name="keyword" value="SIB" placeholder="keyword" />
      </div>
      <div>
        <label for="already_quantity">Already Buy Quantity</label>
        <input type="number" id="already_quantity" value="200" name="alreadyBuy" placeholder="0" />
      </div>
      <div>
        <label for="cost_price">Cost Per Price</label>
        <input type="number" id="cost_price" name="costPerPrice" value="10" placeholder="0.00" step="0.01" />
      </div>
      <div>
        <label for="current_price">Current Per Price</label>
        <input type="number" id="current_price" name="current_price" value="8" placeholder="0.00" step="0.01" />
      </div>
      <div>
        <label for="new_investment">Invest New Amount</label>
        <input type="number" id="new_investment" name="new_investment" value="2000" placeholder="0.00" step="0.01" />
      </div>
      <div>
        <label for="counter">Counter</label>
        <input type="number" id="counter" name="counter" value="50" placeholder="0" />
      </div>
      <div class="checkbox-field">
        <input type="checkbox" id="isSaveDB" name="saveToDb" />
        <label for="isSaveDB">Is save to database?</label>
      </div>
      <div>
        <button type="button" id="btn-submit">Submit</button>
      </div>
    </form>
  </div>


  <div class="tabs">
    <div class="tab-buttons">
      <button class="tab-btn active" data-tab="investmentDetails">Investment Details</button>
      <button class="tab-btn" data-tab="currentMerket">Current Merket</button>
      <button class="tab-btn" data-tab="previousData">Previous Data</button>
      <button class="toggle-btn hide">
        <i class="fa-regular fa-eye-slash"></i> Hide</button>
    </div>

    <!-- Tab 1 -->
    <div id="investmentDetails" class="tab-content active">
      <div class="investment-card" id="calculate-table"></div>
      <div class="investment-card" id="calculate-table-list"></div>
    </div>

    <!-- Tab 2 -->
    <div id="currentMerket" class="tab-content">
      <div class="wrap">
        <div class="header">
          <h1 id="keyWordName"></h1>
          <div class="controls">
            <span id="status" class="pill">Loading…</span>
            <button id="refreshBtn">Refresh</button>
          </div>
        </div>

        <div class="grid">
          <div class="card buy">
            <h2>Buy</h2>
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Price</th>
                  <th>Volume</th>
                </tr>
              </thead>
              <tbody id="buyBody"></tbody>
              <tfoot>
                <tr>
                  <td class="muted">Total</td>
                  <td id="buyAvg" class="muted" colspan="1"></td>
                  <td id="buyTotal" class="muted"></td>
                </tr>
              </tfoot>
            </table>
            <div class="row">
              <div class="kpi">
                <div>Levels</div>
                <div id="buyLevels">—</div>
                <div>Avg Price</div>
                <div id="buyAvg2">—</div>
              </div>
            </div>
          </div>

          <div class="card sell">
            <h2>Sell</h2>
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Price</th>
                  <th>Volume</th>
                </tr>
              </thead>
              <tbody id="sellBody"></tbody>
              <tfoot>
                <tr>
                  <td class="muted">Total</td>
                  <td id="sellAvg" class="muted" colspan="1"></td>
                  <td id="sellTotal" class="muted"></td>
                </tr>
              </tfoot>
            </table>
            <div class="row">
              <div class="kpi">
                <div>Levels</div>
                <div id="sellLevels">—</div>
                <div>Avg Price</div>
                <div id="sellAvg2">—</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="previousData" class="tab-content">
      <div class="grid-4" id="previousDataGrid"></div>
    </div>

  </div>



  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="./js/menu_tab.js"></script>
  <script src="./js/live_data.js"></script>
  <script src="./js/hitlog.js"></script>
  <script src="./js/script.js"></script>
</body>

</html>
