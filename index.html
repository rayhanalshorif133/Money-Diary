<head>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   <script src="https://scripts.sandbox.bka.sh/versions/1.2.0-beta/checkout/bKash-checkout-sandbox.js"></script>

  <link href="./css/style.css" rel="stylesheet">
  <link icon rel="icon" type="image/png" href="./images/icon.ico" />

</head>

<body>
  <nav class="nav_container">
    <div class="nav_left">
      <a href="./index.html" class="logo">
        Money Diary
      </a>
    </div>
    <div class="nav_right">
      <button class="menu_toggle" id="menuToggle">☰</button>
      <div class="nav_links" id="navLinks">
        <button id="LogoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <div class="flex sm:flex-row flex-col m-auto justify-center">
    <a href="./daily-cost.html" class="selected-card">
      <h1>Daily Cost</h1>
    </a>
    <a href="./profit-loss-calculator.html" class="selected-card hidden">
      <h1>Profit Loss</h1>
    </a>
    <a href="./profit-loss-binance.html" class="selected-card">
      <h1>Profit Loss Binance</h1>
    </a>
  </div>


  </div>

  <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="./js/hitlog.js"></script>

  <script>
    $(() => {
      $("#logoutBtn").click(() => {
        supabaseConn.auth.signOut().then(({ error }) => {
          if (error) {
            console.error("Logout error:", error);
          } else {
            localStorage.removeItem('isLogin');
            localStorage.removeItem('user_id');
            localStorage.removeItem('user_email');
            window.location.href = './login.html';
          }
        });
      });
    });
  </script>


</body>

</html>
