<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>Hello, world!</title>
  <link href="./style.css" rel="stylesheet">
</head>

<body>

  <nav class="navbar navbar-expand-lg shadow-sm mb-2 navbar-light bg-light">
    <div class="container py-2 ">
      Nam Pore Duya Hbe
    </div>
  </nav>
  <div class="container">
    <div class="row">
      
      <div class="col-md-4 mx-auto input-box">
        <h3>Information</h3>
        
        <div class="mb-3">
          <label for="input1" class="form-label">Input 1</label>
          <input type="text" class="form-control" id="input1" placeholder="Enter text">
        </div>
        
        <div class="mb-3">
          <label for="input2" class="form-label">Input 2</label>
          <input type="number" class="form-control" id="input2" placeholder="Enter a number">
        </div>
        
        <div class="mb-3">
          <label for="input3" class="form-label">Input 3</label>
          <input type="email" class="form-control" id="input3" placeholder="Enter email">
        </div>
        <div class="mb-3">
          <button type="button" class="btn btn-sky-blue btn-sm w-100" id="btn-submit">Submit</button>
        </div>
      </div>
      <div class="col-md-6 mx-auto">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Age</th>
              <th>Occupation</th>
              <th>Location</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>John Doe</td>
              <td>28</td>
              <td>Software Engineer</td>
              <td>New York</td>
            </tr>
            <tr>
              <td>Jane Smith</td>
              <td>32</td>
              <td>Designer</td>
              <td>Los Angeles</td>
            </tr>
            <tr>
              <td>Sam Brown</td>
              <td>24</td>
              <td>Marketing Manager</td>
              <td>Chicago</td>
            </tr>
            <tr>
              <td>Alice Johnson</td>
              <td>29</td>
              <td>Data Scientist</td>
              <td>San Francisco</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Optional JavaScript; choose one of the two! -->

  <!-- Option 1: Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Option 2: Separate Popper and Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>
</body>

</html>
